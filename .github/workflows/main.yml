name: Generate GitHub Stats

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate GitHub Stats
        run: |
          mkdir -p stats
          curl -o stats/stats.svg "https://github-readme-stats-git-masterrstaa-rickstaa.vercel.app/api?username=santiagopas&show_icons=true&theme=tokyonight&hide_border=true"
          curl -o stats/top-langs.svg "https://github-readme-stats-git-masterrstaa-rickstaa.vercel.app/api/top-langs/?username=santiagopas&layout=compact&theme=tokyonight&hide_border=true"

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add stats/
          git commit -m "update stats" || echo "No changes to commit"
          git push --force

